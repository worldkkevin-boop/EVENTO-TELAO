<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Telão Externo - Saída Limpa</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: relative; }

        /* muted no <video> evita o bloqueio de autoplay dos celulares */
        video { width: 100vw; height: 100vh; object-fit: cover; transition: opacity 0.5s ease; }

        /* 🎭 EFEITO DE ENTRADA DO LETREIRO */
        #telao-overlay {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translate(-50%, 40px); /* Começa um pouco abaixo */
            opacity: 0;                       /* Começa invisível */
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 18px 45px;
            font-size: 3.2rem;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            border-radius: 12px;
            border-left: 12px solid #0078d4;
            z-index: 999;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            text-align: center;
            white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efeito elástico suave */
        }

        /* Classe ativada via JavaScript para disparar a animação */
        #telao-overlay.active {
            transform: translate(-50%, 0); /* Sobe para a posição original */
            opacity: 1;                    /* Aparece */
        }
    </style>
</head>
<body>

    <div id="telao-overlay"></div>

    <video id="remoteVideo" autoplay playsinline muted onclick="this.muted = !this.muted"></video>

    <script>
        let peerConnection;
        const socket = io();
        const videoElement = document.getElementById('remoteVideo');
        const overlayElement = document.getElementById('telao-overlay');
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Permite desmutar o celular clicando em qualquer lugar da tela
        document.body.addEventListener('click', () => {
            if (videoElement.muted) {
                videoElement.muted = false;
                console.log("Áudio liberado pelo operador!");
            }
        });

        // Controle de Cenas
        socket.on('scene-switched', (scene) => {
            if (scene === 'black') videoElement.style.opacity = '0';
            if (scene === 'camera') videoElement.style.opacity = '1';
        });

        // Controle de Texto com Animação de Entrada/Saída
        socket.on('overlay-updated', (data) => {
            if (data.action === 'show') {
                overlayElement.innerText = data.text;
                overlayElement.classList.add('active'); // Ativa o efeito CSS
            } else if (data.action === 'clear') {
                overlayElement.classList.remove('active'); // Remove com efeito sumindo
            }
        });

        // WebRTC Engine
        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.setRemoteDescription(description)
                .then(() => peerConnection.createAnswer())
                .then(sdp => peerConnection.setLocalDescription(sdp))
                .then(() => socket.emit('answer', id, peerConnection.localDescription));

            peerConnection.ontrack = event => { videoElement.srcObject = event.streams[0]; };
            peerConnection.onicecandidate = event => {
                if (event.candidate) socket.emit('candidate', id, event.candidate);
            };
        });

        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('connect', () => { socket.emit('watcher'); });
        socket.on('disconnectBroadcaster', () => { if (peerConnection) peerConnection.close(); videoElement.srcObject = null; });
    </script>
</body>
</html>
