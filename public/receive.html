<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Telão Externo - Multi-Telão</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* CORES UNIÃO BRASIL + GEOMETRIA DO BURACO DO L-SHAPE */
        :root {
            --azul-ub: #00448A; --amarelo-ub: #FFED00; --branco: #FFFFFF;
            /* Onde o vídeo encaixa quando o anúncio está ativo (canto sup. esquerdo).
               Ajuste estes 4 valores para casar EXATAMENTE com o buraco da arte. */
            --hole-top: 0%;
            --hole-left: 0%;
            --hole-width: 78%;
            --hole-height: 86%;
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

        /* VÍDEO: ocupa a tela toda; ao ativar o anúncio, encolhe pro buraco */
        #video-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; overflow: hidden; background: #000;
            transition: all 0.5s ease;
        }
        video { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }

        /* ARTE DE FUNDO (Full HD 1920x1080 com buraco transparente).
           Fica por cima do vídeo; só aparece no modo anúncio.
           Se a imagem faltar, mostra o azul União como reserva. */
        #lshape-art {
            position: absolute; inset: 0; width: 100%; height: 100%;
            background: var(--azul-ub) url('img/lshape-fundo.png') center / 100% 100% no-repeat;
            z-index: 20; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* MODO ANÚNCIO ATIVO */
        body.ads-active #video-wrapper {
            top: var(--hole-top); left: var(--hole-left);
            width: var(--hole-width); height: var(--hole-height);
        }
        body.ads-active #lshape-art { opacity: 1; }

        /* IDENTIFICADOR DE TELÃO (some após 5s) */
        #id-telao { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: var(--amarelo-ub); padding: 10px; border-radius: 5px; font-weight: bold; z-index: 300; }

        /* CONTADOR */
        #contador-telao { position: absolute; top: 20px; right: 20px; background: var(--azul-ub); border: 3px solid var(--amarelo-ub); color: #fff; padding: 15px 30px; font-size: 2rem; font-weight: 900; border-radius: 12px; z-index: 300; display: none; text-transform: uppercase; }
        #contador-telao span { color: var(--amarelo-ub); font-size: 3rem; display: inline-block; }
        @keyframes contador-pop { 0% { transform: scale(1); } 30% { transform: scale(1.3); } 100% { transform: scale(1); } }
        #contador-telao span.pop { animation: contador-pop .4s ease; }

        /* GC / LETREIRO DOS POLÍTICOS (canto inferior esquerdo) */
        #telao-overlay {
            position: absolute; bottom: 8%; left: 5%;
            transform: translateX(-120%); opacity: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0.8) 100%);
            color: #fff; padding: 15px 40px 15px 25px;
            font-size: 2.5rem; font-weight: 800;
            border-left: 15px solid var(--amarelo-ub);
            border-radius: 4px 15px 15px 4px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            z-index: 400; white-space: nowrap;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #telao-overlay.active { transform: translateX(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="video-wrapper">
        <video id="remoteVideo" autoplay playsinline muted onclick="this.muted = !this.muted"></video>
    </div>

    <div id="lshape-art"></div>

    <div id="id-telao">Carregando...</div>
    <div id="contador-telao">Presentes: <span id="num-contador">0</span></div>
    <div id="telao-overlay">NOME DO POLÍTICO</div>

    <script>
        // ID do telão pela URL (ex: receive.html?t=1)
        const params = new URLSearchParams(window.location.search);
        const myTelaoId = params.get('t') || '1';

        const idBadge = document.getElementById('id-telao');
        idBadge.innerText = `CONECTADO: TELÃO ${myTelaoId}`;
        setTimeout(() => idBadge.style.display = 'none', 5000);

        let peerConnection;
        const socket = io();
        const videoElement = document.getElementById('remoteVideo');
        const overlayElement = document.getElementById('telao-overlay');
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Tocar na tela libera o áudio no celular
        document.body.addEventListener('click', () => { videoElement.muted = false; });

        // ANÚNCIOS L-SHAPE (arte única encaixando o vídeo no buraco)
        socket.on('toggle-ads', (startAds) => {
            document.body.classList.toggle('ads-active', !!startAds);
        });

        // CENAS
        socket.on('scene-switched', (scene) => {
            if (scene === 'black') videoElement.style.opacity = '0';
            if (scene === 'camera') videoElement.style.opacity = '1';
        });

        // GC / LETREIRO
        socket.on('overlay-updated', (data) => {
            if (data.action === 'show') {
                overlayElement.innerText = data.text;
                overlayElement.classList.add('active');
            } else if (data.action === 'clear') {
                overlayElement.classList.remove('active');
            }
        });

        // CONTADOR (com animação de rolagem estilo hodômetro)
        const numContador = document.getElementById('num-contador');
        function animarContador(destino) {
            const inicio = parseInt(numContador.dataset.valor || '0', 10) || 0;
            destino = parseInt(destino, 10) || 0;
            numContador.dataset.valor = destino;
            // Pulso visual a cada atualização
            numContador.classList.remove('pop'); void numContador.offsetWidth; numContador.classList.add('pop');
            if (inicio === destino) { numContador.innerText = destino; return; }
            // Quanto maior o salto, um pouco mais de tempo (limitado)
            const dur = Math.min(1200, 400 + Math.abs(destino - inicio) * 120);
            const t0 = performance.now();
            function frame(t) {
                const p = Math.min(1, (t - t0) / dur);
                const eased = 1 - Math.pow(1 - p, 3);
                numContador.innerText = Math.round(inicio + (destino - inicio) * eased);
                if (p < 1) requestAnimationFrame(frame);
                else numContador.innerText = destino;
            }
            requestAnimationFrame(frame);
        }
        socket.on('atualizar-contador', (total) => animarContador(total));
        socket.on('display-contador', (mostrar) => { document.getElementById('contador-telao').style.display = mostrar ? 'block' : 'none'; });

        // WEBRTC
        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.setRemoteDescription(description)
                .then(() => peerConnection.createAnswer())
                .then(sdp => peerConnection.setLocalDescription(sdp))
                .then(() => socket.emit('answer', id, peerConnection.localDescription));
            peerConnection.ontrack = event => { videoElement.srcObject = event.streams[0]; videoElement.style.opacity = '1'; };
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
        });
        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('connect', () => { socket.emit('watcher', myTelaoId); });
        // Quando um transmissor (re)aparece, pede a imagem de novo — evita ficar preto após restart
        socket.on('broadcaster', () => { socket.emit('watcher', myTelaoId); });
        socket.on('disconnectBroadcaster', () => { if (peerConnection) peerConnection.close(); videoElement.srcObject = null; videoElement.style.opacity = '0'; });
    </script>
</body>
</html>
