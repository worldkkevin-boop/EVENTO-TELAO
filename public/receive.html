<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Telão Externo - Multi-Telão</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* CORES UNIÃO BRASIL */
        :root { --azul-ub: #00448A; --amarelo-ub: #FFED00; --branco: #FFFFFF; }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: black; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }

        /* Container que organiza vídeo + painéis de anúncio */
        #main-container {
            display: grid;
            width: 100vw;
            height: 100vh;
            grid-template-areas: "vid vid" "vid vid"; /* Normal: vídeo ocupa tudo */
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            transition: all 0.5s ease;
        }

        /* VÍDEO PRINCIPAL */
        #video-wrapper { grid-area: vid; width: 100%; height: 100%; position: relative; z-index: 10; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }

        /* PAINÉIS L-SHAPE (começam invisíveis) */
        #bottom-panel {
            grid-area: bot; background-color: var(--amarelo-ub);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease; z-index: 1;
        }
        #bottom-panel h2 { color: var(--azul-ub); margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }

        #side-panel {
            grid-area: side; background-color: var(--azul-ub); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
            opacity: 0; transition: opacity 0.5s ease; z-index: 1; border-left: 5px solid var(--amarelo-ub);
        }

        .leader-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
        /* Foto circular: usa imagem local de fundo; se faltar, mostra as iniciais */
        .leader-photo {
            width: 120px; height: 120px; border-radius: 50%; border: 5px solid var(--amarelo-ub);
            background-color: #1b3a63; background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 2.2rem; color: #fff;
        }
        .leader-name { margin-top: 10px; font-weight: bold; font-size: 1.2rem; }
        .leader-title { font-size: 0.9rem; color: #ddd; }

        /* L-SHAPE ATIVO: vídeo encolhe e painéis aparecem */
        #main-container.ads-active {
            grid-template-areas: "vid side" "bot side";
            grid-template-columns: 1fr 280px;
            grid-template-rows: 1fr 100px;
        }
        #main-container.ads-active #bottom-panel,
        #main-container.ads-active #side-panel { opacity: 1; }

        /* IDENTIFICADOR DE TELÃO (some após 5s) */
        #id-telao { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: var(--amarelo-ub); padding: 10px; border-radius: 5px; font-weight: bold; z-index: 200; }

        /* CONTADOR */
        #contador-telao { position: absolute; top: 20px; right: 20px; background: var(--azul-ub); border: 3px solid var(--amarelo-ub); color: white; padding: 15px 30px; font-size: 2rem; font-weight: 900; border-radius: 12px; z-index: 200; display: none; text-transform: uppercase; }
        #contador-telao span { color: var(--amarelo-ub); font-size: 3rem; }

        /* GC / LETREIRO DOS POLÍTICOS (canto inferior esquerdo) */
        #telao-overlay {
            position: absolute; bottom: 8%; left: 5%;
            transform: translateX(-120%); opacity: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0.8) 100%);
            color: #fff; padding: 15px 40px 15px 25px;
            font-size: 2.5rem; font-weight: 800;
            border-left: 15px solid var(--amarelo-ub);
            border-radius: 4px 15px 15px 4px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            z-index: 300; white-space: nowrap;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #telao-overlay.active { transform: translateX(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="main-container">

        <div id="video-wrapper">
            <video id="remoteVideo" autoplay playsinline muted onclick="this.muted = !this.muted"></video>
            <div id="id-telao">Carregando...</div>
            <div id="contador-telao">Presentes: <span id="num-contador">0</span></div>
            <div id="telao-overlay">NOME DO POLÍTICO</div>
        </div>

        <div id="bottom-panel">
            <h2>União que Constrói</h2>
        </div>

        <div id="side-panel">
            <div class="leader-card">
                <div class="leader-photo" style="background-image:url('lideres/clecio.jpg')">CL</div>
                <div class="leader-name">Clécio Luís</div>
                <div class="leader-title">Governador</div>
            </div>
            <div class="leader-card">
                <div class="leader-photo" style="background-image:url('lideres/alliny.jpg')">AS</div>
                <div class="leader-name">Alliny Serrão</div>
                <div class="leader-title">Deputada Estadual</div>
            </div>
            <div class="leader-card">
                <div class="leader-photo" style="background-image:url('lideres/teddy.jpg')">TM</div>
                <div class="leader-name">Teddy Maciel</div>
                <div class="leader-title">Prefeito</div>
            </div>
        </div>
    </div>

    <script>
        // ID do telão pela URL (ex: receive.html?t=1)
        const params = new URLSearchParams(window.location.search);
        const myTelaoId = params.get('t') || '1';

        const idBadge = document.getElementById('id-telao');
        idBadge.innerText = `CONECTADO: TELÃO ${myTelaoId}`;
        setTimeout(() => idBadge.style.display = 'none', 5000);

        let peerConnection;
        const socket = io();
        const videoElement = document.getElementById('remoteVideo');
        const overlayElement = document.getElementById('telao-overlay');
        const mainContainer = document.getElementById('main-container');
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Tocar na tela libera o áudio no celular
        document.body.addEventListener('click', () => { videoElement.muted = false; });

        // ANÚNCIOS L-SHAPE
        socket.on('toggle-ads', (startAds) => {
            if (startAds) mainContainer.classList.add('ads-active');
            else mainContainer.classList.remove('ads-active');
        });

        // CENAS
        socket.on('scene-switched', (scene) => {
            if (scene === 'black') videoElement.style.opacity = '0';
            if (scene === 'camera') videoElement.style.opacity = '1';
        });

        // GC / LETREIRO
        socket.on('overlay-updated', (data) => {
            if (data.action === 'show') {
                overlayElement.innerText = data.text;
                overlayElement.classList.add('active');
            } else if (data.action === 'clear') {
                overlayElement.classList.remove('active');
            }
        });

        // CONTADOR
        socket.on('atualizar-contador', (total) => { document.getElementById('num-contador').innerText = total; });
        socket.on('display-contador', (mostrar) => { document.getElementById('contador-telao').style.display = mostrar ? 'block' : 'none'; });

        // WEBRTC
        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.setRemoteDescription(description)
                .then(() => peerConnection.createAnswer())
                .then(sdp => peerConnection.setLocalDescription(sdp))
                .then(() => socket.emit('answer', id, peerConnection.localDescription));
            peerConnection.ontrack = event => { videoElement.srcObject = event.streams[0]; videoElement.style.opacity = '1'; };
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
        });
        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('connect', () => { socket.emit('watcher', myTelaoId); });
        // Quando um transmissor (re)aparece, pede a imagem de novo — evita ficar preto após restart
        socket.on('broadcaster', () => { socket.emit('watcher', myTelaoId); });
        socket.on('disconnectBroadcaster', () => { if (peerConnection) peerConnection.close(); videoElement.srcObject = null; videoElement.style.opacity = '0'; });
    </script>
</body>
</html>
